services:
  crypto-bot:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-bot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      API_ENABLED: "true"
      TZ: ${TZ:-Europe/Paris}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-Europe/Paris}
    cpus: ${BOT_CPU_LIMIT:-1.50}
    mem_limit: ${BOT_MEM_LIMIT:-1024m}
    mem_reservation: ${BOT_MEM_RESERVATION:-512m}
    pids_limit: 256
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import json,sys,urllib.request;u=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5);d=json.loads(u.read().decode('utf-8'));sys.exit(0 if d.get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
